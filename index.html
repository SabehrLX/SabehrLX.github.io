# SabehrLX.github.io
3D Señal.Edif

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Sistema de Señalización Geo-AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      
      <a-entity gps-entity-place="latitude: -34.8243849; longitude: -58.6480628;" look-at="[gps-camera]">
        
        <a-plane color="#000" height="2" width="4" opacity="0.7" position="0 2 0"></a-plane>
        
        <a-text 
            value="ESCUELA 97"
            color="#FFD700" 
            align="center" 
            position="0 2.5 0.1" 
            width="6" 
            font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>
        
        <a-text 
            value="HORARIOS 8:00 A 18:30" 
            color="white" 
            align="center" 
            position="0 1.5 0.1" 
            width="4">
        </a-text>

        <a-cylinder color="yellow" height="0.5" radius="0.1" position="0 0 0"></a-cylinder>
      </a-entity>

      <a-camera gps-camera rotation-reader> </a-camera>
    </a-scene>
  </body>
</html>
